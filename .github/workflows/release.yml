name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run quality checks
        run: make ci

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-X 'blockgo/internal/version.Version=${VERSION}' -X 'blockgo/internal/version.Commit=${GITHUB_SHA}' -X 'blockgo/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" -o "dist/blockgo-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/blockgo
          go build -trimpath -ldflags "-X 'blockgo/internal/version.Version=${VERSION}' -X 'blockgo/internal/version.Commit=${GITHUB_SHA}' -X 'blockgo/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" -o "dist/blockgo-node-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/blockgo-node

      - name: Package artifacts
        run: |
          mkdir -p package
          cp README.md LICENSE package/
          cp dist/blockgo-${{ matrix.goos }}-${{ matrix.goarch }} package/blockgo
          cp dist/blockgo-node-${{ matrix.goos }}-${{ matrix.goarch }} package/blockgo-node
          tar -czf "dist/blockgo_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}" -C package .

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blockgo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/blockgo_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directory
        run: |
          mkdir -p release
          find dist -type f -name "blockgo_*" -exec cp {} release/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
