name: Feature request
description: Suggest an improvement
title: "[Feature]: "
labels: [ "enhancement" ]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version of the idea.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional context
