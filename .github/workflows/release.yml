name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag once
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run quality checks
        run: make ci

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: validate

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: make release-dist VERSION=${{ github.ref_name }} GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} DIST_DIR=dist

      - name: Package artifacts
        run: |
          mkdir -p package
          cp README.md LICENSE package/
          cp dist/blockgo-${{ matrix.goos }}-${{ matrix.goarch }} package/blockgo
          cp dist/blockgo-node-${{ matrix.goos }}-${{ matrix.goarch }} package/blockgo-node
          tar -czf "dist/blockgo_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}" -C package .

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blockgo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/blockgo_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directory
        run: |
          mkdir -p release
          find dist -type f -name "blockgo_*" -exec cp {} release/ \;

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
